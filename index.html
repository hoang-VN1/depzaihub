<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Key của bạn đã sẵn sàng ✦</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0b0e1a;
            padding: 16px;
            margin: 0;
        }
        .card {
            max-width: 500px;
            width: 100%;
            background: linear-gradient(145deg, #141b2b, #1a2335);
            border-radius: 36px;
            padding: 30px 20px 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,215,0,0.08);
            text-align: center;
            border: 1px solid rgba(255,215,0,0.1);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255,215,0,0.02), transparent, rgba(255,215,0,0.02), transparent);
            animation: rotate 25s linear infinite;
            pointer-events: none;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        .badge {
            background: rgba(0,255,150,0.1);
            border: 1px solid rgba(0,255,150,0.15);
            border-radius: 50px;
            padding: 5px 16px;
            display: inline-block;
            color: #00ff96;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            position: relative;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
            position: relative;
            line-height: 1.3;
        }
        h1 span { color: #ffd700; }
        .sub {
            color: #8892b0;
            font-size: 14px;
            margin-bottom: 22px;
            position: relative;
            padding: 0 6px;
        }
        .key-box {
            background: rgba(0,0,0,0.5);
            border-radius: 18px;
            padding: 18px 12px;
            margin: 16px 0 18px;
            border: 1px dashed rgba(255,215,0,0.25);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }
        .key-box:active {
            border-color: #ffd700;
            background: rgba(255,215,0,0.06);
            transform: scale(0.98);
        }
        .key-label {
            color: #a8b2d1;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }
        #accessKey {
            font-size: 26px;
            font-weight: 700;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255,215,0,0.1);
            word-break: break-all;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.5px;
            padding: 4px 0;
        }
        .status-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 14px 0 10px;
            font-size: 13px;
            color: #8892b0;
            position: relative;
        }
        .status-dot {
            display: inline-block;
            width: 8px; height: 8px;
            background: #00ff96;
            border-radius: 50%;
            margin-right: 4px;
            box-shadow: 0 0 10px #00ff96;
            animation: pulse 1.8s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .status-active { color: #00ff96; font-weight: 600; }
        .expiry {
            color: #fbbf24;
            font-size: 12px;
            background: rgba(251,191,36,0.08);
            padding: 4px 12px;
            border-radius: 50px;
            border: 1px solid rgba(251,191,36,0.12);
        }
        .product {
            color: #ccd6f6;
            font-size: 14px;
            margin: 12px 0 14px;
            position: relative;
        }
        .product strong { color: #ffd700; }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            position: relative;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            background: rgba(255,255,255,0.05);
            color: #ccd6f6;
            border: 1px solid rgba(255,255,255,0.06);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex: 1 1 auto;
            min-width: 100px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(0.95); }
        .btn-primary {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #0b0e1a;
            border: none;
            font-weight: 700;
        }
        .btn-primary:active { box-shadow: 0 4px 16px rgba(247,151,30,0.3); }
        .btn-copy {
            background: rgba(0,255,200,0.08);
            border-color: rgba(0,255,200,0.15);
            color: #00ffc8;
        }
        .btn-copy:active { background: rgba(0,255,200,0.15); }
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a2335;
            padding: 10px 22px;
            border-radius: 50px;
            color: #fff;
            border: 1px solid #2a3455;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.35s;
            pointer-events: none;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            max-width: 90%;
            text-align: center;
            z-index: 999;
        }
        .toast.show { opacity: 1; }
        .gen-info {
            color: #4a5a7a;
            font-size: 11px;
            margin-top: 18px;
            border-top: 1px solid rgba(255,255,255,0.04);
            padding-top: 16px;
            position: relative;
            line-height: 1.5;
        }
        .gen-info strong { color: #fbbf24; }
        /* Fix cho màn hình nhỏ */
        @media (max-width: 420px) {
            .card { padding: 22px 14px; }
            #accessKey { font-size: 20px; }
            .btn { font-size: 12px; padding: 10px 12px; min-width: 70px; }
            .expiry { font-size: 11px; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="badge">✦ XÁC THỰC THÀNH CÔNG</div>
    <h1># Key của bạn <span>đã sẵn sàng</span> ✦</h1>
    <p class="sub">Sao chép key và dán vào Hub để bắt đầu.</p>

    <div class="key-box" id="keyBox" title="Nhấn để sao chép nhanh">
        <div class="key-label">🔑 Access Key</div>
        <div id="accessKey">⏳ Đang tạo...</div>
    </div>

    <div class="status-row">
        <span><span class="status-dot"></span><span class="status-active">● ACTIVE</span></span>
        <span class="expiry" id="expiryText">⏳ Hết hạn sau: -- ngày --:--:--</span>
    </div>

    <div class="product">
        📦 Sản phẩm: <strong>RealKid Hub</strong>
    </div>

    <div class="btn-group">
        <button class="btn btn-primary" id="genKeyBtn">🔄 TẠO MỚI</button>
        <button class="btn btn-copy" id="copyBtn">📋 SAO CHÉP</button>
    </div>

    <div class="gen-info">
        ⚡ Prefix: <span id="prefixDisplay">TRAU</span> · Thời hạn: <strong>3 ngày</strong> · Tự động lưu trên trình duyệt
    </div>
</div>

<div id="toast" class="toast">✅ Đã sao chép!</div>

<script>
    (function() {
        // ---- CẤU HÌNH ----
        const CONFIG = {
            prefix: 'TRAU',
            keyLength: 8,
            expiryDays: 3,
        };

        // ---- DOM ----
        const accessKeyEl = document.getElementById('accessKey');
        const keyBox = document.getElementById('keyBox');
        const copyBtn = document.getElementById('copyBtn');
        const genBtn = document.getElementById('genKeyBtn');
        const expiryEl = document.getElementById('expiryText');
        const prefixDisplay = document.getElementById('prefixDisplay');
        const toast = document.getElementById('toast');

        // ---- STATE ----
        let currentKey = '';
        let expiryTimestamp = 0;

        // ---- TOAST ----
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ---- TẠO KEY NGẪU NHIÊN ----
        function generateKey(prefix, length) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let random = '';
            for (let i = 0; i < length; i++) {
                random += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return prefix + '_' + random;
        }

        // ---- CẬP NHẬT HIỂN THỊ ----
        function updateDisplay(key) {
            currentKey = key;
            accessKeyEl.textContent = key;
            const now = Date.now();
            expiryTimestamp = now + CONFIG.expiryDays * 24 * 60 * 60 * 1000;
            updateExpiryCountdown();

            try {
                localStorage.setItem('realkid_key', key);
                localStorage.setItem('realkid_expiry', expiryTimestamp);
            } catch(e) { /* bỏ qua nếu không có localStorage */ }
        }

        // ---- ĐẾM NGƯỢC ----
        function updateExpiryCountdown() {
            if (!expiryTimestamp) {
                expiryEl.textContent = '⏳ Hết hạn: --:--:--';
                return;
            }
            const now = Date.now();
            const diff = Math.max(0, expiryTimestamp - now);
            const totalSeconds = Math.floor(diff / 1000);
            const days = Math.floor(totalSeconds / 86400);
            const hours = String(Math.floor((totalSeconds % 86400) / 3600)).padStart(2, '0');
            const minutes = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
            const seconds = String(totalSeconds % 60).padStart(2, '0');

            if (days > 0) {
                expiryEl.textContent = `⏳ Hết hạn sau: ${days} ngày ${hours}:${minutes}:${seconds}`;
            } else if (totalSeconds > 0) {
                expiryEl.textContent = `⏳ Hết hạn sau: ${hours}:${minutes}:${seconds}`;
            } else {
                expiryEl.textContent = '⏳ Key đã hết hạn! Tạo mới.';
                expiryEl.style.color = '#f87171';
                return;
            }
            expiryEl.style.color = '#fbbf24';
        }

        // ---- TẠO KEY MỚI ----
        function createNewKey() {
            const newKey = generateKey(CONFIG.prefix, CONFIG.keyLength);
            updateDisplay(newKey);
            showToast('✅ Key mới (hạn 3 ngày): ' + newKey);
            if (window.history && window.history.replaceState) {
                try {
                    const url = new URL(window.location);
                    url.searchParams.set('key', newKey);
                    url.searchParams.set('type', 'success');
                    window.history.replaceState({}, '', url);
                } catch(e) {}
            }
        }

        // ---- SAO CHÉP ----
        function copyKey() {
            const key = accessKeyEl.textContent;
            if (!key || key === '⏳ Đang tạo...' || key === 'TRAU_QMCH3ILH') {
                showToast('⚠️ Chưa có key, hãy tạo mới!');
                return;
            }
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(key).then(() => {
                    showToast('✅ Đã sao chép: ' + key);
                }).catch(() => fallbackCopy(key));
            } else {
                fallbackCopy(key);
            }
        }

        function fallbackCopy(text) {
            try {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                ta.style.top = '0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                ta.remove();
                showToast('✅ Đã sao chép: ' + text);
            } catch(e) {
                showToast('⚠️ Không thể copy, hãy chọn và copy thủ công.');
            }
        }

        // ---- KHỞI TẠO ----
        function init() {
            prefixDisplay.textContent = CONFIG.prefix;

            // Đọc từ URL
            const params = new URLSearchParams(window.location.search);
            const urlKey = params.get('key');
            const urlType = params.get('type');

            // Đọc từ localStorage
            let savedKey = '';
            let savedExpiry = 0;
            try {
                savedKey = localStorage.getItem('realkid_key') || '';
                savedExpiry = parseInt(localStorage.getItem('realkid_expiry') || '0');
            } catch(e) {}

            // Ưu tiên URL key
            if (urlKey && urlType === 'success' && urlKey.startsWith(CONFIG.prefix + '_')) {
                updateDisplay(urlKey);
                showToast('🔑 Key từ link: ' + urlKey);
            }
            // Dùng key lưu nếu còn hạn
            else if (savedKey && savedExpiry > Date.now() && savedKey.startsWith(CONFIG.prefix + '_')) {
                updateDisplay(savedKey);
            }
            // Tạo mới
            else {
                createNewKey();
            }

            // Cập nhật đồng hồ mỗi giây
            setInterval(updateExpiryCountdown, 1000);

            // Sự kiện (hỗ trợ cả touch và click)
            keyBox.addEventListener('click', copyKey);
            keyBox.addEventListener('touchend', function(e) {
                e.preventDefault();
                copyKey();
            });
            copyBtn.addEventListener('click', copyKey);
            genBtn.addEventListener('click', createNewKey);
        }

        // Chạy khi DOM sẵn sàng
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
</script>
</body>
</html>
